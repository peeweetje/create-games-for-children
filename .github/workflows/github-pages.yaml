name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create _headers file for security headers
        run: |
          echo '/*' > ./dist/_headers
          echo '  X-Content-Type-Options: nosniff' >> ./dist/_headers
          echo '  X-Frame-Options: DENY' >> ./dist/_headers
          echo '  Referrer-Policy: strict-origin-when-cross-origin' >> ./dist/_headers
          echo '  Content-Security-Policy: default-src self; script-src self '\''unsafe-inline'\''; style-src self '\''unsafe-inline'\'' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src self data:; connect-src self; frame-ancestors '\''none'\''; base-uri self; form-action self;' >> ./dist/_headers

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4